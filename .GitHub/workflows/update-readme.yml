name: Update README with Weather Info

on:
  schedule:
    - cron: '*/1 * * * *' # Runs every minute
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Get Weather Info
      id: weather
      run: |
        latitude="45.494141"
        longitude="-122.870117"
        
        
        response=$(curl -s "https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&timezone=auto")
        temp=$(echo $response | jq '.current_weather.temperature')
        # Note: Open-Meteo API does not provide daily sunrise and sunset times in the current weather API.
        # You might need to use another API or service to get sunrise and sunset times.
        # For demonstration, we'll use fixed times.
        sunrise="06:00"
        sunset="18:00"
        
        echo "::set-output name=temp::${temp}"
        echo "::set-output name=sunrise::${sunrise}"
        echo "::set-output name=sunset::${sunset}"

    - name: Update README
      run: |
        sed -i "s/{{TEMP}}/${{ steps.weather.outputs.temp }}/" README.md
        sed -i "s/{{SUNRISE}}/${{ steps.weather.outputs.sunrise }}/" README.md
        sed -i "s/{{SUNSET}}/${{ steps.weather.outputs.sunset }}/" README.md
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add README.md
        git commit -m "Update README with weather info"
        git push
